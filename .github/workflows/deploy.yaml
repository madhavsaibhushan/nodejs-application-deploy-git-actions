name: deploy Nodejs application

on:  
  push:
    branches: 
          - main
jobs:
  deploy:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout Code
          uses: actions/checkout@v4

        - name: Deploy via SSH
          uses: appleboy/ssh-action@v1.0.3  
          with:
              host: ${{secrets.HOST_URL}}
              username: root
              key : ${{secrets.SSH_KEY}}
              script: 
                cd /home/madhavsaibhushan
                git pull
                docker compose up -d --build